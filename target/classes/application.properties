# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── DataSource (H2 in-memory — swap to MySQL for production) ────────────────
spring.datasource.url=jdbc:h2:mem:grievancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console  →  http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# FIX: allow the H2 console iframe to load under Spring Security
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Static resources — serves frontend/index.html ───────────────────────────
spring.web.resources.static-locations=classpath:/frontend/,classpath:/static/
spring.mvc.static-path-pattern=/**

# ─── Circular dependency safety net ──────────────────────────────────────────
# FIX: @Lazy on individual beans is the primary fix; this is a fallback guard
#      so startup never fails with BeanCurrentlyInCreationException.
spring.main.allow-circular-references=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.grievance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# ─── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ─── JWT ──────────────────────────────────────────────────────────────────────
# IMPORTANT: Change this secret before deploying to production!
app.jwt.secret=grievanceSystemSecretKey2024ForJWTTokenSigningMustBe256BitsLong==
app.jwt.expiration-ms=86400000

# ─── Default admin credentials (seeded at startup by DataInitializer) ─────────
app.admin.username=admin
app.admin.password=admin123
app.admin.email=admin@adypu.edu.in

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads

# ─── Email (SMTP — configure with real credentials for production) ─────────────
# Using Gmail SMTP as example. Set to false to disable email notifications.
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── SLA Deadlines (hours per priority) ──────────────────────────────────────
app.sla.high-hours=24
app.sla.medium-hours=72
app.sla.low-hours=168