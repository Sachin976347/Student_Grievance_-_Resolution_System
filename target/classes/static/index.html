<!DOCTYPE html>
<html>
<head>
  <title>Student Grievance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>Submit Grievance</h3>

<input id="name" class="form-control mb-2" placeholder="Name">
<textarea id="desc" class="form-control mb-2" placeholder="Grievance"></textarea>
<button class="btn btn-primary" onclick="submit()">Submit</button>

<hr>

<ul id="list"></ul>

<script>
function submit() {
  fetch("/api/grievances", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      studentName:name.value,
      description:desc.value
    })
  }).then(load);
}

function load() {
  fetch("/api/grievances")
    .then(r=>r.json())
    .then(d=>{
      list.innerHTML="";
      d.forEach(g=>{
        list.innerHTML+=`<li>${g.studentName}: ${g.description} (${g.status})</li>`;
      });
    });
}
load();
</script>
</body>
</html>
